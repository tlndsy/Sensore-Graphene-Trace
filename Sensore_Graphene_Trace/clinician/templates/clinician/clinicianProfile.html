<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensor Report Display</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%  load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">

    <style>
        .main_page_element {
            position: relative;
            height: 0;
            width: 0;
        }

        .profile_picture_box {
            position: absolute;
            top: 10px;
            left: 1200px;
            width: 250px;
            height: 250px;
            border: 2px solid black;
            text-align: center;
        }

        .personal_information_box {
            position: absolute;
            top: 10px;
            left: 550px;
            width: 450px;
            height: 450px;
            border: 2px solid black;
            text-align: center;
        }

        .patient_list_box {
            position: absolute;
            top: 10px;
            left: 100px;
            width: 250px;
            height: 450px;
            border: 2px solid black;
            text-align: center;
        }
    </style>
</head>
<body>
<nav>
    <h3 class="nav-title"> Sensore Graphene Trace </h3>
    <button class="side-panel-toggle" type="button" aria-label="menu"> ☰ </button>
</nav>
<div class="main_page_element">
    <div class="profile_picture_box">
        This is a picture.
    </div>

    <div class="personal_information_box">
        This box has personal information
    </div>

    <div class="patient_list_box">
        This box has a list of patients
    </div>
</div>

</body>
</html>
