{% extends "user_layout.html" %}
{% load model_extras %}

{% block title %}
    Delete {{ model_verbose_name }}
{% endblock %}

{% block content %}
    <h1 class="admin">Delete {{ model_verbose_name }}</h1>

    <p>Are you sure you want to delete this object?</p>

    <form class="admin" method="post">
        {% csrf_token %}
        <button class="admin" type="submit">Yes, delete</button>
    </form>

    <a class="admin" href="{% url 'user:administrator:generic_list' app_label model_name %}">Cancel</a>
{% endblock %}
