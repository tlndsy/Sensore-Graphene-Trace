{% extends "administrator_layout.html" %}
{% load model_extras %}

{% block title %}
    Delete {{ model_verbose_name }}
{% endblock %}

{% block content %}
<h1>Delete {{ model_verbose_name }}</h1>

<p>Are you sure you want to delete this object?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'user:administrator:generic_list' app_label model_name %}">Cancel</a>
{% endblock %}
