{% extends "user_layout.html" %}
{% load model_extras %}

{% block title %}
    Edit {{ model_verbose_name }}
{% endblock %}

{% block content %}
    <h1 class="admin">Update {{ model_verbose_name }}</h1>
    {% if model_name == "user" %}
        <a class="admin" href="{% url 'user:administrator:user_password_change' object.pk %}">
            Change Password
        </a>
    {% endif %}

    <form class="admin" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="admin" type="submit">Save</button>
        <a class="admin" href="{% url 'user:administrator:generic_list' app_label model_name %}">Cancel</a>
    </form>
{% endblock %}
