{% extends "user_layout.html" %}

{% block title %}
    Create {{ model_verbose_name }}
{% endblock %}

{% block content %}
    <h1 class="admin">Create {{ model_verbose_name }}</h1>

    <form class="admin" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="admin" type="submit">Save</button>
        <a class="admin" href="{% url 'user:administrator:generic_list' app_label model_name %}">Cancel</a>
    </form>
{% endblock %}
