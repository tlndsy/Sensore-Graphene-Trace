{% extends "administrator_layout.html" %}

{% block title %}
    Create {{ model_verbose_name }}
{% endblock %}

{% block content %}
<h1>Create {{ model_verbose_name }}</h1>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Save</button>
  <a href="{% url 'user:administrator:generic_list' app_label model_name %}">Cancel</a>
</form>
{% endblock %}
