{% extends "user_layout.html" %}
{% load model_extras %}

{% block title %}
    Edit {{ model_verbose_name }}
{% endblock %}

{% block content %}
    <h1 class="admin"  >Update {{ model_verbose_name }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="admin" type="submit">Save</button>
        <a class="admin" href="{% url 'user:administrator:generic_update' 'user' 'user' user_pk %}">Cancel</a>
    </form>
{% endblock %}
