{% extends "layout.html" %}

{% block title %}
    User Edit Page
{% endblock %}

{% block content %}

<h2>Edit User</h2>

<p><strong>User:</strong> {{ edit_user.email }}</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
    <a href="{% url 'user:administrator:user_list' %}">Cancel</a>
</form>

{% endblock %}
