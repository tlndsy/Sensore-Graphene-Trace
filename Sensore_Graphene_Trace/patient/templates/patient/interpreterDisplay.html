<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensor Report Display</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%  load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">

    <style>
        .main_page_element {
            position: relative;
            height: 0;
            width: 0;
        }

        .heatmap_box {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 750px;
            height: 350px;
            border: 2px solid black;
            text-align: center;
        }

        .report_box {
            position: absolute;
            top: 370px;
            left: 10px;
            width: 750px;
            height: 250px;
            border: 2px solid black;
            padding: 5px
        }

        .index_box {
            position: absolute;
            top: 50px;
            left: 1050px;
            width: 200px;
            height: 120px;
            border: 2px solid black;
            padding: 5px
            text-align: center;
        }

        .button {
            border: 2px solid black;
            text_align: center;
            padding: 16px 32px;
            width: 200px;
            height: 120px;
            font-size: 30px;
            color: white;
            background-color: #008CBA;
            cursor: pointer;
            transition-duration: 0.4s;
        }

        .button:hover {
            background-color: white;
            color: black;
        }

        .button1 {
            position: absolute;
            top: 200px;
            left: 1050px;
        }

        .button2 {
            position: absolute;
            top: 350px;
            left: 1050px;
        }

        .button3 {
            position: absolute;
            top: 500px;
            left: 1050px;
        }
    </style>
</head>
<body>
<nav>
    <h3 class="nav-title"> Sensore Graphene Trace </h3>
    <button class="side-panel-toggle" type="button" aria-label="menu"> ☰ </button>
</nav>
<div class="main_page_element">
    <div class="heatmap_box">
        <h1> A heatmap will go here </h1>
    </div>

    <div class="report_box">
        <h1> Scan Analysis Report </h1>
        <p style="font-size:24px">
            {{ report_0 }}
        </p>
        <p style="font-size:24px">
            {{ report_1 }}
        </p>
        <p style="font-size:24px">
            {{ report_2 }}
        </p>
    </div>

    <div class="index_box">
        <p style="font-size:24px; text-align: center">
            This report is X out of X.
        </p>
    </div>

    <button class="button button1">
        Earlier Report
    </button>
    <button class="button button2">
        Later Report
    </button>
    <button class="button button3">
        Newest Report
    </button>
</div>
</body>
</html>
