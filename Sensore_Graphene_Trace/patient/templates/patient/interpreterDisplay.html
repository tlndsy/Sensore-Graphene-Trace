<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensor Report Display</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {%  load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">

    <style>
        .main_page_element {
            position: relative;
            height: 0;
            width: 0;
        }

        .heatmap_box {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 750px;
            height: 350px;
            border: 2px solid black;
            text-align: center;
        }

        .report_box {
            position: absolute;
            top: 370px;
            left: 10px;
            width: 750px;
            height: 250px;
            border: 2px solid black;
            padding: 5px
        }
    </style>
</head>
<body>
<nav>
    <h3 class="nav-title"> Sensore Graphene Trace </h3>
    <button class="side-panel-toggle" type="button" aria-label="menu"> ☰ </button>
</nav>
<div class="main_page_element">
    <div class="heatmap_box">
        <h1> A heatmap will go here </h1>
    </div>

    <div class="report_box">
        <h1> Scan Analysis Report </h1>
        <p>
            {{ report_0 }}
        </p>
        <p>
            {{ report_1 }}
        </p>
        <p>
            {{ report_2 }}
        </p>
        <p>
            {{ report_3}}
        </p>
    </div>
</div>
</body>
</html>
